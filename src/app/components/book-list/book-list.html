<div style="max-width: 1000px; margin: 2rem auto; padding: 1rem;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Library Books</h2>
    <mat-form-field appearance="outline" style="width: 300px; margin-bottom: -1.25em;">
      <mat-label>Search Books</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Angular" #input>
    </mat-form-field>
  </div>

  <div *ngIf="errorMessage" style="color: red; padding: 10px; border: 1px solid red; margin-bottom: 10px;">
      {{ errorMessage }}
  </div>
  <div *ngIf="successMessage" style="color: green; padding: 10px; border: 1px solid green; margin-bottom: 10px;">
      {{ successMessage }}
  </div>

  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort>

      <!-- Title Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Title </th>
        <td mat-cell *matCellDef="let book"> {{book.title}} </td>
      </ng-container>

      <!-- Author Column -->
      <ng-container matColumnDef="author">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Author </th>
        <td mat-cell *matCellDef="let book"> {{book.author}} </td>
      </ng-container>

      <!-- Price Column -->
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
        <td mat-cell *matCellDef="let book"> {{book.price | currency:'INR'}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
        <td mat-cell *matCellDef="let book">
          <span *ngIf="book.available" style="color: green; font-weight: bold;">Available</span>
          <span *ngIf="!book.available" style="color: orange; font-weight: bold;">Issued</span>
        </td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let book">
          <button mat-button color="primary" [routerLink]="['/edit-book', book.id]">Edit</button>
          <button mat-button color="warn" (click)="deleteBook(book.id)">Delete</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5" style="padding: 20px; text-align: center;">No books found matching the filter "{{input.value}}"</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of books"></mat-paginator>
  </div>
</div>
